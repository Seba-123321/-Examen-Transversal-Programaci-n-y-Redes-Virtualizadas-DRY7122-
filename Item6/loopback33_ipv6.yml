---
- name: Crear Loopback33 con IPv6
  hosts: cisco
  gather_facts: no

  tasks:

    - name: Crear interfaz Loopback33
      ios_config:
        lines:
          - interface Loopback33
          - description Loopback creada con Ansible

    - name: Configurar IPv6 en Loopback33
      ios_config:
        parents: interface Loopback33
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
